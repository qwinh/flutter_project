name: album_manager
description: "A Flutter photo album manager with tags and SQLite persistence."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^15.1.2
  provider: ^6.1.5
  sqflite: ^2.4.2
  path: ^1.9.1
  photo_manager: ^3.6.4
  flutter_local_notifications: ^19.0.0
  intl: ^0.20.2
  permission_handler: ^11.4.0
  exif: ^3.3.0
  drag_select_grid_view: ^0.7.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
