name: photovault
description: A Flutter photo album manager app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.8.1

  # State management
  provider: ^6.1.2

  # Device images
  photo_manager: ^3.5.1
  photo_manager_image_provider: ^2.1.1

  # Local database
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.4

  # Local notifications
  flutter_local_notifications: ^19.3.0

  # Date formatting
  intl: ^0.19.0

  timezone: ^0.10.1
  flutter_timezone: ^5.0.1
  flutter_test:
    sdk: flutter

dev_dependencies:
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.3


flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  image_path: "assets/icon/icon.jpg"
  min_sdk_android: 21

flutter_native_splash:
  color: "#1a1a2e"
  image: assets/icon/icon.jpg
  android_12:
    color: "#1a1a2e"
    image: assets/icon/icon.jpg
  fullscreen: true